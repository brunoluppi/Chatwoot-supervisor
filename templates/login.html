<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kluh Supervisor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: #0d1117; 
            color: #c9d1d9; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .login-card { 
            background: #161b22; 
            border: 1px solid #30363d; 
            padding: 2.5rem; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .btn-info { 
            background-color: #58a6ff; 
            border: none; 
            color: #0d1117; 
            font-weight: bold; 
            padding: 12px;
        }
        .btn-info:hover {
            background-color: #79c0ff;
        }
        .form-label {
            font-size: 0.9rem;
            color: #8b949e;
        }
        input { 
            background: #0d1117 !important; 
            border: 1px solid #30363d !important; 
            color: white !important; 
            padding: 12px !important;
        }
        input:focus {
            border-color: #58a6ff !important;
            box-shadow: none !important;
        }
        .brand-text {
            color: #58a6ff;
            letter-spacing: 2px;
            font-weight: 800;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <h2 class="brand-text h4">KLUH SOFTWARE</h2>
            <p class="small text-muted">Painel de Gestão Supervisor</p>
        </div>
        
        <form action="/auth" method="POST">
            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <input type="text" name="user" class="form-control" placeholder="admin" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label">Senha</label>
                <input type="password" name="pass" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-info w-100 uppercase">ACESSAR SISTEMA</button>
        </form>
        
        <div class="mt-4 text-center">
            <p class="text-muted small">© 2026 Kluh Software. Todos os direitos reservados.</p>
        </div>
    </div>
</body>
</html>
