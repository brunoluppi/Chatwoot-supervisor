<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Supervisor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: #0d1117; 
            color: #f0f6fc; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .login-card { 
            background: #161b22; 
            border: 1px solid #30363d; 
            padding: 2.5rem; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .btn-info { 
            background-color: #58a6ff; 
            border: none; 
            color: #0d1117; 
            font-weight: bold; 
            padding: 12px;
        }
        .btn-info:hover { background-color: #79c0ff; }
        .form-label { font-size: 0.95rem; color: #f0f6fc; font-weight: 500; }
        input { 
            background: #0d1117 !important; 
            border: 1px solid #30363d !important; 
            color: #ffffff !important; 
            padding: 12px !important;
        }
        input::placeholder { color: #484f58 !important; }
        .brand-text { color: #58a6ff; letter-spacing: 2px; font-weight: 800; }
        .alert { font-size: 0.9rem; border: none; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <h2 class="brand-text h4">KLUH SOFTWARE</h2>
            <p class="small text-muted">Acesso ao Painel Chatwoor - Supervisor</p>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-danger bg-danger text-white mb-4 text-center">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/auth" method="POST">
            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <input type="text" name="user" class="form-control" placeholder="admin" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label">Senha</label>
                <input type="password" name="pass" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-info w-100 uppercase">ENTRAR</button>
        </form>
    </div>
</body>
</html>
